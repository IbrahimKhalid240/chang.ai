<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NexusAI - Next Gen Chat Ecosystem</title>
    <style>
        /* --- SYSTEM DESIGN & VARIABLES --- */
        :root {
            --bg-dark: #030712;
            --bg-card: rgba(17, 24, 39, 0.7);
            --border-glow: rgba(99, 102, 241, 0.15);
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
            --accent-primary: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --accent-solid: #6366f1;
            --user-bubble: linear-gradient(135deg, #1e1b4b 0%, #311042 100%);
            --bot-bubble: rgba(31, 41, 55, 0.6);
            --sidebar-width: 280px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        html, body {
            width: 100%;
            height: 100%;
            height: -webkit-fill-available;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            overflow: hidden;
        }

        /* --- ADVANCED KINETIC ANIMATIONS --- */
        @keyframes dynamicPulse {
            0% { transform: scale(1); opacity: 0.4; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 0.4; }
        }

        @keyframes messageSlide {
            from { opacity: 0; transform: translateY(15px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes microGlow {
            0% { border-color: rgba(99, 102, 241, 0.2); }
            50% { border-color: rgba(168, 85, 247, 0.5); }
            100% { border-color: rgba(99, 102, 241, 0.2); }
        }

        /* --- FULL SCREEN AUTHENTICATION GATE --- */
        .portal-auth-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #0f1123 0%, #030712 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.6s;
            padding: 20px;
        }

        .portal-auth-wrapper.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .auth-ambient-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--accent-primary);
            filter: blur(120px);
            opacity: 0.3;
            pointer-events: none;
            animation: dynamicPulse 8s infinite ease-in-out;
        }

        .auth-card-full {
            width: 100%;
            max-width: 440px;
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 24px;
            padding: 40px 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: messageSlide 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            z-index: 2;
        }

        .brand-meta {
            text-align: center;
            margin-bottom: 32px;
        }

        .brand-meta .logo-icon {
            width: 48px;
            height: 48px;
            background: var(--accent-primary);
            border-radius: 12px;
            margin: 0 auto 16px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
        }

        .brand-meta h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #ffffff, #9ca3af);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 14px 16px;
            color: var(--text-primary);
            font-size: 16px;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-group input:focus {
            border-color: var(--accent-solid);
            background: rgba(15, 23, 42, 0.9);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        .action-submit-btn {
            width: 100%;
            background: var(--accent-primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .action-submit-btn:hover {
            opacity: 0.95;
            transform: translateY(-1px);
        }

        .action-submit-btn:active {
            transform: translateY(1px);
        }

        /* --- ECOSYSTEM APPLICATION LAYOUT --- */
        .app-workspace {
            display: flex;
            width: 100%;
            height: 100vh;
            height: -webkit-fill-available;
            position: relative;
        }

        /* Responsive Sidebar Grid */
        .app-sidebar {
            width: var(--sidebar-width);
            height: 100%;
            background: #090d16;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
        }

        .sidebar-header {
            padding: 24px 20px;
            font-weight: 700;
            font-size: 18px;
            letter-spacing: -0.3px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .sidebar-menu {
            flex: 1;
            padding: 16px 12px;
            overflow-y: auto;
        }

        .menu-item-active {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 10px;
            padding: 12px;
            font-size: 14px;
            color: var(--text-primary);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        /* Main Dialogue Engine Section */
        .engine-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
            background: radial-gradient(circle at top right, #0b0f19, #030712);
        }

        .engine-navbar {
            height: 70px;
            width: 100%;
            background: rgba(3, 7, 18, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 10;
        }

        .menu-toggle-mobile {
            display: none;
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        .user-badge {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 500;
            font-size: 14px;
            letter-spacing: 0.2px;
        }

        /* Infinite Stream Container */
        .dialogue-stream {
            flex: 1;
            overflow-y: auto;
            padding: 32px 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            -webkit-overflow-scrolling: touch;
        }

        .dialogue-stream::-webkit-scrollbar {
            width: 6px;
        }
        .dialogue-stream::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .node-bubble {
            max-width: 80%;
            padding: 16px 20px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.6;
            letter-spacing: 0.1px;
            animation: messageSlide 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            word-wrap: break-word;
        }

        .node-bubble.user-type {
            background: var(--user-bubble);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        }

        .node-bubble.bot-type {
            background: var(--bot-bubble);
            color: var(--text-primary);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Real-Time Loading Indicator */
        .typing-indicator {
            display: none;
            align-items: center;
            gap: 6px;
            background: var(--bot-bubble);
            padding: 12px 20px;
            border-radius: 20px;
            align-self: flex-start;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: dynamicPulse 1.2s infinite ease-in-out;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        /* --- MOBILE OPTIMIZED FIXED DOCK INPUT AREA --- */
        .dock-input-container {
            padding: 20px 24px;
            background: linear-gradient(to top, #030712 80%, rgba(3, 7, 18, 0));
            position: relative;
            z-index: 11;
        }

        .dock-form-wrapper {
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            background: rgba(17, 24, 39, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            padding: 8px;
            display: flex;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: microGlow 4s infinite ease-in-out;
        }

        .dock-form-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-size: 16px;
            padding: 12px 16px;
            min-width: 0; /* Prevents overflow layouts on ultra-small displays */
        }

        .dock-form-wrapper input::placeholder {
            color: var(--text-secondary);
        }

        .action-send-node {
            background: var(--accent-primary);
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease;
            flex-shrink: 0;
        }

        .action-send-node:active {
            transform: scale(0.92);
        }

        /* --- SYSTEM RESPONSIVE MEDIA BREAKPOINTS --- */
        @media (max-width: 1024px) {
            .app-sidebar {
                position: absolute;
                left: 0;
                top: 0;
                transform: translateX(-100%);
                box-shadow: 25px 0 50px rgba(0,0,0,0.8);
            }

            .app-sidebar.active-mobile {
                transform: translateX(0);
            }

            .menu-toggle-mobile {
                display: block;
            }

            .sidebar-overlay {
                display: none;
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.6);
                z-index: 99;
            }

            .sidebar-overlay.active-mobile {
                display: block;
            }
        }

        @media (max-width: 640px) {
            .auth-card-full {
                padding: 32px 20px;
                border: none;
                background: transparent;
                box-shadow: none;
            }

            .dialogue-stream {
                padding: 16px;
                gap: 16px;
            }

            .node-bubble {
                max-width: 90%;
                font-size: 14px;
                padding: 12px 16px;
            }

            .dock-input-container {
                padding: 12px;
            }
            
            .engine-navbar {
                padding: 0 16px;
            }
        }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleMobileSidebar()"></div>

    <main class="portal-auth-wrapper" id="portalAuth">
        <div class="auth-ambient-glow"></div>
        <div class="auth-card-full">
            <div class="brand-meta">
                <div class="logo-icon">N</div>
                <h1>Initialize Session</h1>
                <p style="color: var(--text-secondary); margin-top: 6px; font-size: 14px;">Access your operational interface node</p>
            </div>
            <form id="gatekeeperForm" onsubmit="executeEcosystemLogin(event)">
                <div class="input-group">
                    <label for="gateUser">Identity Domain / User</label>
                    <input type="text" id="gateUser" required placeholder="Enter any identifier..." autocomplete="name">
                </div>
                <div class="input-group">
                    <label for="gatePass">Access Key / Token</label>
                    <input type="password" id="gatePass" required placeholder="••••••••" autocomplete="current-password">
                </div>
                <button type="submit" class="action-submit-btn">Authenticate & Boot</button>
            </form>
        </div>
    </main>

    <div class="app-workspace">
        
        <aside class="app-sidebar" id="appSidebar">
            <div class="sidebar-header">
                <span style="background: var(--accent-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">NEXUS SYSTEM</span>
            </div>
            <div class="sidebar-menu">
                <div class="menu-item-active">
                    🤖 Dynamic Engine Base v1.2
                </div>
            </div>
        </aside>

        <section class="engine-main">
            <header class="engine-navbar">
                <button class="menu-toggle-mobile" onclick="toggleMobileSidebar()">☰</button>
                <div style="font-weight: 700; letter-spacing: -0.5px; font-size: 18px;">Core Console</div>
                <div class="user-badge" id="identityBadge">Hi, User!</div>
            </header>

            <div class="dialogue-stream" id="dialogueStream">
                </div>

            <footer class="dock-input-container">
                <div class="dock-form-wrapper">
                    <input type="text" id="nodeQueryInput" placeholder="Send system prompt signal..." autocomplete="off">
                    <button class="action-send-node" onclick="transmitQuerySignal()" aria-label="Transmit Prompt">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
            </footer>
        </section>
    </div>

    <script>
        /**
         * System Database Matrix Mapping
         * Simulates structural parsing equivalent to reading from an unstructured target text stream file.
         */
        const textDatabaseSchema = {
            "hello": "System connection established. Operational matrix running efficiently. How can I assist your objectives today?",
            "hi": "System online. Listening for prompt commands.",
            "help": "Available prompt pathways map directly to target structures including: 'what is this framework', 'who created this build', or system clearing requests.",
            "what is this framework": "This is a full-viewport responsive engine built directly via structured HTML5 architecture, vanilla kinetic CSS engines, and raw JavaScript interface tracking logic.",
            "who created this build": "This optimized core platform ecosystem node was compiled and configured by a creative developer.",
            "clear": "Visual elements cleared. Platform operational logs purged locally."
        };

        const universalFallbackValue = "Signal accepted, but no entry matched in the flat database dictionary. Verify syntax, or type 'help'.";

        // Mobile Sidebar Display Controller Toggle Logic Functionality
        function toggleMobileSidebar() {
            const sidebar = document.getElementById('appSidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('active-mobile');
            overlay.classList.toggle('active-mobile');
        }

        // Complete Login Sequence Handshake Engine Logic
        function executeEcosystemLogin(event) {
            event.preventDefault();
            const targetedUserVal = document.getElementById('gateUser').value.trim();

            if (targetedUserVal) {
                // Instantly update badge components tracking identities
                document.getElementById('identityBadge').innerText = `Hi, ${targetedUserVal}!`;

                // Fade away Authorization wrapper architecture cleanly
                const authScreen = document.getElementById('portalAuth');
                authScreen.classList.add('hidden');

                // Trigger Greeting Lifecycle Initial Load
                initializeEcosystemGreeting(targetedUserVal);
            }
        }

        // Trigger welcome node elements dynamically built
        function initializeEcosystemGreeting(username) {
            const streamNode = document.getElementById('dialogueStream');
            const systemNodeBubble = document.createElement('div');
            systemNodeBubble.className = 'node-bubble bot-type';
            systemNodeBubble.innerText = `Welcome to the interface matrix, ${username}. Communication lanes are open. Type commands or ask questions to initialize response processing arrays.`;
            
            streamNode.appendChild(systemNodeBubble);
        }

        // Query Signal Transfer Pipelines Execution Logic Loop
        function transmitQuerySignal() {
            const entryField = document.getElementById('nodeQueryInput');
            const targetQueryString = entryField.value.trim();

            // Intercept attempts containing no valid alphanumeric data characters
            if (!targetQueryString) return;

            const dialogueStream = document.getElementById('dialogueStream');

            // 1. Build and position User conversation block node
            const userBubbleNode = document.createElement('div');
            userBubbleNode.className = 'node-bubble user-type';
            userBubbleNode.innerText = targetQueryString;
            dialogueStream.appendChild(userBubbleNode);

            // Clean the input element immediately to keep responsive pipelines snappy
            entryField.value = '';

            // Handle mobile scroll structural positioning tracking instantly 
            executeSmoothStreamScroll();

            // Create and append dynamic typing state indicator block
            const typingIndicatorBlock = createTypingIndicator();
            dialogueStream.appendChild(typingIndicatorBlock);
            executeSmoothStreamScroll();

            // 2. Perform database entry lookup matching after a realistic processing delay
            setTimeout(() => {
                // Destroy tracking element dynamically
                typingIndicatorBlock.remove();

                // Normalize inputs to bypass matching failures due to formatting
                const cleanKey = targetQueryString.toLowerCase().replace(/[?.,!/]/g, "").trim();

                // Check key structure logic maps
                let systemResolvedOutput = textDatabaseSchema[cleanKey];
                
                if (!systemResolvedOutput) {
                    systemResolvedOutput = universalFallbackValue;
                }

                // If user specifies clear utility tool macro command, wipe terminal nodes out
                if (cleanKey === "clear") {
                    dialogueStream.innerHTML = '';
                    systemResolvedOutput = "Terminal view updated. Logs cleared.";
                }

                // Append Response Data Structural Object Block Node Elements
                const responseBotBubble = document.createElement('div');
                responseBotBubble.className = 'node-bubble bot-type';
                responseBotBubble.innerText = systemResolvedOutput;
                dialogueStream.appendChild(responseBotBubble);

                // Re-align structural coordinates view layout boundaries positions
                executeSmoothStreamScroll();
            }, 1100);
        }

        // Create HTML elements for typing indicator smoothly on runtime demands
        function createTypingIndicator() {
            const containerNode = document.createElement('div');
            containerNode.className = 'typing-indicator';
            containerNode.style.display = 'flex';
            
            for (let idx = 0; idx < 3; idx++) {
                const dot = document.createElement('div');
                dot.className = 'typing-dot';
                containerNode.appendChild(dot);
            }
            return containerNode;
        }

        // Handle auto positioning scroll logic systems
        function executeSmoothStreamScroll() {
            const stream = document.getElementById('dialogueStream');
            stream.scrollTo({
                top: stream.scrollHeight,
                behavior: 'smooth'
            });
        }

        // Bind enter key structural event listener configurations natively
        document.getElementById('nodeQueryInput').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                transmitQuerySignal();
            }
        });
    </script>
</body>
</html>
